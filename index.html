<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISOPIXEL BKK - Audio Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #020617; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .playlist-container { max-height: 350px; overflow-y: auto; }
        input[type='range'] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 6px; }
        input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // รายชื่อเพลงหลัก 4 เพลง และที่ว่างสำหรับเพลงที่ 5-15
            const [songs, setSongs] = useState([
                { id: 1, title: "1. Sodapop Hunter", file: "soda.mp3", color: "from-pink-500" },
                { id: 2, title: "2. สเต็ปจิ๋วไฟลุก", file: "step.mp3", color: "from-orange-500" },
                { id: 3, title: "3. Siam Fighter", file: "siam.mp3", color: "from-blue-500" },
                { id: 4, title: "4. Doremi Rainbow", file: "doremi.mp3", color: "from-green-500" },
                // เพลงที่ 5-15 (ใส่ชื่อไฟล์หลอกไว้ก่อน ถ้าอัปโหลดขึ้น GitHub ก็มาเปลี่ยนชื่อตรงนี้ค่ะ)
                { id: 5, title: "5. รอเพิ่มเพลง...", file: "song5.mp3", color: "from-gray-700" },
                { id: 6, title: "6. รอเพิ่มเพลง...", file: "song6.mp3", color: "from-gray-700" },
                { id: 7, title: "7. รอเพิ่มเพลง...", file: "song7.mp3", color: "from-gray-700" },
                { id: 8, title: "8. รอเพิ่มเพลง...", file: "song8.mp3", color: "from-gray-700" },
                { id: 9, title: "9. รอเพิ่มเพลง...", file: "song9.mp3", color: "from-gray-700" },
                { id: 10, title: "10. รอเพิ่มเพลง...", file: "song10.mp3", color: "from-gray-700" },
                { id: 11, title: "11. รอเพิ่มเพลง...", file: "song11.mp3", color: "from-gray-700" },
                { id: 12, title: "12. รอเพิ่มเพลง...", file: "song12.mp3", color: "from-gray-700" },
                { id: 13, title: "13. รอเพิ่มเพลง...", file: "song13.mp3", color: "from-gray-700" },
                { id: 14, title: "14. รอเพิ่มเพลง...", file: "song14.mp3", color: "from-gray-700" },
                { id: 15, title: "15. รอเพิ่มเพลง...", file: "song15.mp3", color: "from-gray-700" }
            ]);

            const [currentTrack, setCurrentTrack] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [audioError, setAudioError] = useState(false);
            const audioRef = useRef(null);

            // ฟังก์ชันอัปโหลดเพลงเพิ่มเข้าคิว (ใช้งานได้ทันทีในเบราว์เซอร์)
            const handleUpload = (e) => {
                const uploadedFiles = Array.from(e.target.files);
                const newTracks = uploadedFiles.map((f, i) => ({
                    id: songs.length + i + 1,
                    title: `✨ ${f.name.replace('.mp3', '')}`,
                    file: URL.createObjectURL(f),
                    color: "from-yellow-500"
                }));
                setSongs([...songs, ...newTracks]);
            };

            const togglePlay = () => {
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play().catch(() => setAudioError(true));
                setIsPlaying(!isPlaying);
            };

            const changeTrack = (index) => {
                setCurrentTrack(index);
                setIsPlaying(true);
                setAudioError(false);
            };

            useEffect(() => {
                if (audioRef.current) {
                    audioRef.current.load();
                    if (isPlaying) audioRef.current.play().catch(() => setIsPlaying(false));
                }
            }, [currentTrack]);

            return (
                <div className="max-w-md mx-auto my-10 p-6 glass shadow-2xl">
                    <div className="text-center mb-6">
                        <h1 className="text-2xl font-bold">ISOPIXEL BKK</h1>
                        <p className="text-blue-400 text-xs tracking-widest uppercase">Performance Player</p>
                    </div>

                    {/* หน้าปกเพลง */}
                    <div className={`w-full aspect-square mb-6 rounded-xl bg-gradient-to-br ${songs[currentTrack].color} to-black flex items-center justify-center`}>
                        <div className="text-white opacity-20">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                        </div>
                    </div>

                    <div className="text-center mb-6">
                        <h2 className="text-xl font-semibold truncate">{songs[currentTrack].title}</h2>
                        {audioError && <p className="text-red-500 text-xs mt-2">⚠️ ไม่พบไฟล์เพลง กรุณาเช็กชื่อไฟล์บน GitHub</p>}
                    </div>

                    {/* ปุ่มควบคุม */}
                    <div className="flex justify-center items-center gap-8 mb-8">
                        <button onClick={() => changeTrack((currentTrack - 1 + songs.length) % songs.length)} className="text-gray-400 hover:text-white">
                            <svg width="30" height="30" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button onClick={togglePlay} className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center hover:bg-blue-500 transition-all">
                            {isPlaying ? (
                                <svg width="30" height="30" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                            ) : (
                                <svg width="30" height="30" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            )}
                        </button>
                        <button onClick={() => changeTrack((currentTrack + 1) % songs.length)} className="text-gray-400 hover:text-white">
                            <svg width="30" height="30" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                    </div>

                    {/* ช่องอัปโหลดไฟล์เพิ่ม */}
                    <div className="mb-6">
                        <label className="block w-full py-2 bg-white/5 border border-dashed border-white/20 rounded-lg text-center cursor-pointer hover:bg-white/10 text-xs text-gray-400">
                            + เพิ่มเพลงใหม่เข้าคิวแสดง
                            <input type="file" accept="audio/*" multiple className="hidden" onChange={handleUpload} />
                        </label>
                    </div>

                    {/* รายการเพลง */}
                    <div className="playlist-container space-y-2">
                        {songs.map((song, index) => (
                            <div 
                                key={song.id} 
                                onClick={() => changeTrack(index)}
                                className={`p-3 rounded-lg flex justify-between items-center cursor-pointer transition-all ${currentTrack === index ? 'bg-blue-600/20 border-l-4 border-blue-500' : 'hover:bg-white/5'}`}
                            >
                                <span className={`text-sm ${currentTrack === index ? 'text-white' : 'text-gray-400'}`}>{song.title}</span>
                                {currentTrack === index && isPlaying && <span className="animate-pulse text-blue-500">playing</span>}
                            </div>
                        ))}
                    </div>

                    <audio ref={audioRef} src={songs[currentTrack].file} onEnded={() => changeTrack((currentTrack + 1) % songs.length)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
