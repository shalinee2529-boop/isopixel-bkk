<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISOPIXEL Professional Audio Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #020617 0%, #0f172a 100%); min-height: 100vh; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .bass-glow { box-shadow: 0 0 40px rgba(59, 130, 246, 0.15); }
        .playlist-scroll { max-height: 400px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
        input[type='range'] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 6px; outline: none; }
        input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Play: () => <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3v18l15-9L5 3z"/></svg>,
            Pause: () => <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>,
            SkipBack: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>,
            SkipFwd: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>,
            Music: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>,
            Upload: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Download: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        };

        const App = () => {
            // --- 1. ส่วนรายชื่อเพลง (เพิ่มให้ครบ 15 เพลงได้ที่นี่) ---
           const [songs] = useState([
                { id: 1, title: "1. Sodapop Hunter", file: "soda.mp3", color: "from-pink-500 to-purple-600" },
                { id: 2, title: "2. สเต็ปจิ๋วไฟลุก", file: "step.mp3", color: "from-orange-500 to-red-600" },
                { id: 3, title: "3. Siam Fighter", file: "Siam Fighter p6.mp3", color: "from-blue-500 to-cyan-600" },
                { id: 4, title: "4. Doremi Rainbow", file: "Doremi Rainbow K....mp3", color: "from-green-500 to-emerald-600" }
            ]);
                // เพลงที่ 5-15 (ใส่ชื่อไฟล์ให้ตรงกับที่อัปโหลดขึ้น GitHub นะคะ)
                { id: 5, title: "5. เพลงรอเพิ่ม...", file: "song5.mp3", color: "from-gray-600 to-gray-800" },
                { id: 6, title: "6. เพลงรอเพิ่ม...", file: "song6.mp3", color: "from-gray-600 to-gray-800" },
                { id: 7, title: "7. เพลงรอเพิ่ม...", file: "song7.mp3", color: "from-gray-600 to-gray-800" },
                { id: 8, title: "8. เพลงรอเพิ่ม...", file: "song8.mp3", color: "from-gray-600 to-gray-800" },
                { id: 9, title: "9. เพลงรอเพิ่ม...", file: "song9.mp3", color: "from-gray-600 to-gray-800" },
                { id: 10, title: "10. เพลงรอเพิ่ม...", file: "song10.mp3", color: "from-gray-600 to-gray-800" },
                { id: 11, title: "11. เพลงรอเพิ่ม...", file: "song11.mp3", color: "from-gray-600 to-gray-800" },
                { id: 12, title: "12. เพลงรอเพิ่ม...", file: "song12.mp3", color: "from-gray-600 to-gray-800" },
                { id: 13, title: "13. เพลงรอเพิ่ม...", file: "song13.mp3", color: "from-gray-600 to-gray-800" },
                { id: 14, title: "14. เพลงรอเพิ่ม...", file: "song14.mp3", color: "from-gray-600 to-gray-800" },
                { id: 15, title: "15. เพลงรอเพิ่ม...", file: "song15.mp3", color: "from-gray-600 to-gray-800" },
            ]);

            const [currentTrackIndex, setCurrentTrackIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const audioRef = useRef(null);

            // --- 2. ส่วนฟังก์ชันอัปโหลดเพลงเพิ่ม (ชั่วคราว) ---
            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                const newSongs = files.map((file, index) => ({
                    id: songs.length + index + 1,
                    title: `✨ ${file.name.replace('.mp3', '')}`,
                    file: URL.createObjectURL(file),
                    color: "from-yellow-500 to-amber-700",
                    isLocal: true
                }));
                setSongs([...songs, ...newSongs]);
            };

            useEffect(() => {
                if (audioRef.current) {
                    audioRef.current.pause();
                    audioRef.current.load();
                    if (isPlaying) audioRef.current.play().catch(() => setIsPlaying(false));
                }
            }, [currentTrackIndex]);

            const togglePlay = () => {
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            const formatTime = (time) => {
                const min = Math.floor(time / 60);
                const sec = Math.floor(time % 60);
                return `${min}:${sec < 10 ? '0' : ''}${sec}`;
            };

            return (
                <div className="flex flex-col items-center justify-center p-4 min-h-screen">
                    <div className="glass w-full max-w-2xl p-6 md:p-10 bass-glow">
                        
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold text-white tracking-tight">ISOPIXEL BKK</h1>
                            <p className="text-blue-400 text-xs uppercase tracking-[0.3em] mt-1">Siam Fighting Performance</p>
                        </div>

                        {/* Player Display */}
                        <div className="flex flex-col md:flex-row items-center gap-8 mb-10">
                            <div className={`w-48 h-48 rounded-2xl bg-gradient-to-br ${songs[currentTrackIndex].color} shadow-2xl flex items-center justify-center transition-all duration-500 ${isPlaying ? 'scale-105 rotate-3' : ''}`}>
                                <Icons.Music />
                            </div>
                            <div className="flex-1 text-center md:text-left">
                                <h2 className="text-2xl font-bold text-white mb-2">{songs[currentTrackIndex].title}</h2>
                                <p className="text-gray-400 text-sm mb-6">กำลังเล่นลำดับที่ {currentTrackIndex + 1} จาก {songs.length}</p>
                                
                                <input type="range" className="w-full" value={currentTime} max={duration || 0} onChange={(e) => audioRef.current.currentTime = e.target.value} />
                                <div className="flex justify-between text-xs text-gray-500 mt-2 font-mono">
                                    <span>{formatTime(currentTime)}</span>
                                    <span>{formatTime(duration)}</span>
                                </div>
                            </div>
                        </div>

                        {/* Controls */}
                        <div className="flex items-center justify-center gap-6 mb-10">
                            <button onClick={() => setCurrentTrackIndex((currentTrackIndex - 1 + songs.length) % songs.length)} className="text-gray-400 hover:text-white"><Icons.SkipBack /></button>
                            <button onClick={togglePlay} className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center shadow-lg hover:bg-blue-500 transition-transform active:scale-90">
                                {isPlaying ? <Icons.Pause /> : <Icons.Play />}
                            </button>
                            <button onClick={() => setCurrentTrackIndex((currentTrackIndex + 1) % songs.length)} className="text-gray-400 hover:text-white"><Icons.SkipFwd /></button>
                        </div>

                        {/* Upload Button */}
                        <div className="mb-6">
                            <label className="flex items-center justify-center gap-2 w-full py-3 bg-white/5 border border-dashed border-white/20 rounded-xl cursor-pointer hover:bg-white/10 transition-all text-sm text-gray-300">
                                <Icons.Upload /> <span>เพิ่มเพลงใหม่เข้าคิวแสดง (ชั่วคราว)</span>
                                <input type="file" accept="audio/*" multiple className="hidden" onChange={handleFileUpload} />
                            </label>
                        </div>

                        {/* Playlist */}
                        <div className="playlist-scroll space-y-2 pr-2">
                            {songs.map((song, index) => (
                                <div key={song.id} onClick={() => {setCurrentTrackIndex(index); setIsPlaying(true);}} className={`flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all ${currentTrackIndex === index ? 'bg-blue-600/20 border border-blue-500/50' : 'bg-white/5 hover:bg-white/10'}`}>
                                    <div className="flex items-center gap-3">
                                        <span className="text-xs text-gray-500 w-5">{index + 1}</span>
                                        <span className={`text-sm font-medium ${currentTrackIndex === index ? 'text-white' : 'text-gray-300'}`}>{song.title}</span>
                                    </div>
                                    {!song.isLocal && <a href={song.file} download className="p-2 text-gray-500 hover:text-white"><Icons.Download /></a>}
                                </div>
                            ))}
                        </div>

                        <audio ref={audioRef} src={songs[currentTrackIndex].file} onTimeUpdate={(e) => setCurrentTime(e.target.currentTime)} onLoadedMetadata={(e) => setDuration(e.target.duration)} onEnded={() => setCurrentTrackIndex((currentTrackIndex + 1) % songs.length)} />
                    </div>
                    <p className="mt-6 text-[10px] text-gray-600 uppercase tracking-widest">ISOPIXEL STABLE VERSION 2026</p>
                </div>
            );
        };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
    </script>
</body>
</html>
