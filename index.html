<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siam Fighting Professional Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #020617 100%); min-height: 100vh; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .bass-glow { box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        input[type='range'] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 6px; outline: none; }
        input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid white; transition: all 0.2s; }
        input[type='range']::-webkit-slider-thumb:hover { transform: scale(1.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Play: () => <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3v18l15-9L5 3z"/></svg>,
            Pause: () => <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>,
            SkipBack: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>,
            SkipFwd: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>,
            Music: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>,
            Disc: () => <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>,
            Volume: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>,
            Bass: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="2"></circle><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"></path></svg>,
            Download: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            Shield: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        };

        const App = () => {
            const [songs] = useState([
                { id: 1, title: "1. Sodapop Hunter (ป.1)", file: "soda.mp3", color: "from-pink-500 to-purple-600" },
                { id: 2, title: "2. สเต็ปจิ๋วไฟลุก (อ.3)", file: "step.mp3", color: "from-orange-500 to-red-600" },
                { id: 3, title: "3. Siam Fighter (ป.6)", file: "siam.mp3", color: "from-blue-500 to-cyan-600" },
                { id: 4, title: "4. Doremi Rainbow (อ.1)", file: "doremi.mp3", color: "from-green-500 to-emerald-600" }
            ]);

            const [currentTrackIndex, setCurrentTrackIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [volume, setVolume] = useState(1);
            const [bass, setBass] = useState(12);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [isProtected, setIsProtected] = useState(false);

            const audioRef = useRef(null);
            const audioContextRef = useRef(null);
            const bassFilterRef = useRef(null);
            const sourceRef = useRef(null);

            const initAudioContext = () => {
                if (window.location.protocol === 'file:') return;
                if (audioContextRef.current) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContextRef.current = new AudioContext();
                    sourceRef.current = audioContextRef.current.createMediaElementSource(audioRef.current);
                    
                    // --- ระบบกู้ชีพ (Anti-Distortion Pipeline) ---
                    // 1. ลดความดังลงก่อนที่มันจะชนเพดานลำโพง (ลดลง 30%)
                    const preGain = audioContextRef.current.createGain();
                    preGain.gain.value = 0.7; 

                    // 2. คอมเพรสเซอร์ (ตะครุบเสียงที่ล้นขอบให้มนลง ลดอาการเสียงแตก)
                    const compressor = audioContextRef.current.createDynamicsCompressor();
                    compressor.threshold.value = -12;
                    compressor.knee.value = 40; 
                    compressor.ratio.value = 12;
                    compressor.attack.value = 0;
                    compressor.release.value = 0.25;

                    // 3. ลดเสียงแหลมที่บาดหู (ลดความซ่าของเสียงแตก)
                    const trebleCut = audioContextRef.current.createBiquadFilter();
                    trebleCut.type = "highshelf";
                    trebleCut.frequency.value = 6000;
                    trebleCut.gain.value = -5; // กดเสียงแหลมลง -5dB

                    // 4. คงเบสไว้ให้กระหึ่มเหมือนเดิม
                    bassFilterRef.current = audioContextRef.current.createBiquadFilter();
                    bassFilterRef.current.type = "lowshelf";
                    bassFilterRef.current.frequency.value = 150; 
                    bassFilterRef.current.gain.value = bass;

                    // เชื่อมต่อสายสัญญาณทั้งหมด
                    sourceRef.current.connect(preGain);
                    preGain.connect(compressor);
                    compressor.connect(trebleCut);
                    trebleCut.connect(bassFilterRef.current);
                    bassFilterRef.current.connect(audioContextRef.current.destination);

                    setIsProtected(true);
                } catch (e) {
                    console.log("Audio Context fallback");
                }
            };

            useEffect(() => {
                if (bassFilterRef.current) {
                    bassFilterRef.current.gain.value = bass;
                }
            }, [bass]);

            useEffect(() => {
                if (audioRef.current) {
                    audioRef.current.pause();
                    audioRef.current.load();
                    if (isPlaying) {
                        const playPromise = audioRef.current.play();
                        if (playPromise !== undefined) {
                            playPromise.catch(() => setIsPlaying(false));
                        }
                    }
                }
            }, [currentTrackIndex]);

            const togglePlay = () => {
                if (!audioRef.current) return;
                initAudioContext();
                
                if (audioContextRef.current && audioContextRef.current.state === 'suspended') {
                    audioContextRef.current.resume();
                }

                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    const playPromise = audioRef.current.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => setIsPlaying(true)).catch(() => setIsPlaying(false));
                    }
                }
            };

            const changeTrack = (index) => {
                setCurrentTrackIndex(index);
                setIsPlaying(true);
            };

            const formatTime = (time) => {
                if (isNaN(time) || !isFinite(time)) return "0:00";
                const min = Math.floor(time / 60);
                const sec = Math.floor(time % 60);
                return `${min}:${sec < 10 ? '0' : ''}${sec}`;
            };

            return (
                <div className="flex flex-col items-center justify-center p-4 md:p-10 min-h-screen">
                    <div className="glass w-full max-w-xl p-8 md:p-10 bass-glow relative overflow-hidden">
                        
                        <div className={`absolute -top-20 -left-20 w-64 h-64 bg-blue-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 transition-opacity duration-1000 ${isPlaying ? 'opacity-60' : 'opacity-20'}`}></div>
                        <div className={`absolute -bottom-20 -right-20 w-64 h-64 bg-purple-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 transition-opacity duration-1000 ${isPlaying ? 'opacity-60' : 'opacity-20'}`}></div>

                        <div className="text-center mb-8 relative z-10">
                            <h1 className="text-4xl font-bold text-white mb-2 drop-shadow-md">งานสายสัมพันธ์</h1>
                            <p className="text-blue-300 text-xs font-semibold uppercase tracking-[0.2em] mb-3">14 มีนาคม 2026</p>
                            
                            {/* ป้ายบอกสถานะการกู้ชีพเสียง */}
                            <div className="flex justify-center">
                                <span className={`flex items-center gap-1 text-[10px] font-bold px-3 py-1 rounded-full border ${isProtected ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-300' : 'bg-gray-500/20 border-gray-500/50 text-gray-400'}`}>
                                    <Icons.Shield /> {isProtected ? 'ระบบกรองเสียงแตก (ANTI-DISTORTION) ทำงานแล้ว' : 'กด PLAY เพื่อเปิดระบบกรองเสียง'}
                                </span>
                            </div>
                        </div>

                        <div className="flex flex-col items-center mb-10 relative z-10">
                            <div className={`w-60 h-60 rounded-full bg-gradient-to-br ${songs[currentTrackIndex].color} flex items-center justify-center shadow-[0_0_40px_rgba(0,0,0,0.5)] transition-all duration-700 ${isPlaying ? 'scale-105 shadow-blue-500/30' : 'scale-95 opacity-90'}`}>
                                <div className="bg-gray-900 w-52 h-52 rounded-full flex items-center justify-center border-4 border-gray-800/50">
                                    <div className={`text-gray-500 transition-all duration-[3000ms] ${isPlaying ? 'animate-[spin_3s_linear_infinite] text-white/50' : ''}`}>
                                        <Icons.Disc />
                                    </div>
                                </div>
                            </div>
                            <h2 className="text-2xl font-bold mt-8 tracking-wide text-center">{songs[currentTrackIndex].title}</h2>
                            <div className="flex items-center gap-2 mt-2">
                                <span className={`w-2 h-2 rounded-full ${isPlaying ? 'bg-green-500 animate-pulse' : 'bg-gray-500'}`}></span>
                                <p className="text-blue-400 text-sm font-medium tracking-widest">BASS: {bass}dB</p>
                            </div>
                        </div>

                        <audio 
                            ref={audioRef} 
                            src={songs[currentTrackIndex].file}
                            onTimeUpdate={(e) => setCurrentTime(e.target.currentTime)}
                            onLoadedMetadata={(e) => setDuration(e.target.duration)}
                            onEnded={() => changeTrack((currentTrackIndex + 1) % songs.length)}
                        />

                        <div className="mb-8 relative z-10">
                            <input 
                                type="range" 
                                className="w-full" 
                                value={currentTime} 
                                max={duration || 0}
                                onChange={(e) => {
                                    audioRef.current.currentTime = e.target.value;
                                    setCurrentTime(e.target.value);
                                }}
                            />
                            <div className="flex justify-between text-xs text-gray-400 mt-2 font-mono">
                                <span>{formatTime(currentTime)}</span>
                                <span>{formatTime(duration)}</span>
                            </div>
                        </div>

                        <div className="flex items-center justify-center gap-8 mb-10 relative z-10">
                            <button onClick={() => changeTrack((currentTrackIndex - 1 + songs.length) % songs.length)} className="text-gray-400 hover:text-white transition transform hover:scale-110">
                                <Icons.SkipBack />
                            </button>
                            <button onClick={togglePlay} className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center hover:bg-blue-500 transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_30px_rgba(37,99,235,0.5)] border-4 border-blue-400/30 text-white pl-1">
                                {isPlaying ? <Icons.Pause /> : <Icons.Play />}
                            </button>
                            <button onClick={() => changeTrack((currentTrackIndex + 1) % songs.length)} className="text-gray-400 hover:text-white transition transform hover:scale-110">
                                <Icons.SkipFwd />
                            </button>
                        </div>

                        <div className="space-y-3 relative z-10">
                            <h3 className="text-xs font-bold text-gray-500 uppercase tracking-[0.1em] mb-4 pl-2">รายชื่อเพลง (กดปุ่มขวาเพื่อโหลดใส่แฟลชไดร์ฟ)</h3>
                            {songs.map((song, index) => (
                                <div 
                                    key={song.id}
                                    className={`flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all duration-300 ${currentTrackIndex === index ? 'bg-gradient-to-r from-blue-900/40 to-blue-600/10 border-l-4 border-blue-500' : 'bg-white/5 hover:bg-white/10 border-l-4 border-transparent'}`}
                                    onClick={() => changeTrack(index)}
                                >
                                    <div className="flex items-center gap-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${currentTrackIndex === index ? 'bg-blue-500 text-white' : 'bg-gray-800 text-gray-400'}`}>
                                            <Icons.Music />
                                        </div>
                                        <span className={`font-semibold tracking-wide ${currentTrackIndex === index ? 'text-white' : 'text-gray-400'}`}>{song.title}</span>
                                    </div>
                                    
                                    <a 
                                        href={song.file}
                                        download={song.file}
                                        onClick={(e) => e.stopPropagation()}
                                        className="p-3 text-blue-400 hover:text-white hover:bg-blue-500 rounded-full transition-all flex items-center gap-2 bg-blue-900/30 border border-blue-500/30"
                                        title="ดาวน์โหลดไฟล์นี้"
                                    >
                                        <Icons.Download /> 
                                        <span className="text-xs font-bold hidden sm:block">โหลดใส่แฟลชไดร์ฟ</span>
                                    </a>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="mt-8 text-center opacity-30">
                        <p className="text-[10px] uppercase tracking-[0.3em]">Rescue Edition (Anti-Distortion) • 2026</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
