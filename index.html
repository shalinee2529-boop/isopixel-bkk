<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISOPIXEL BKK - PRO PLAYER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #020617; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .bass-glow { box-shadow: 0 0 50px rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body>
    <div id="root">
        <div style="padding: 50px; text-align: center;">
            <h2>กำลังเริ่มระบบเครื่องเล่นเพลง...</h2>
            <p>หากหน้าจอนี้ไม่หายไปภายใน 5 วินาที กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตค่ะ</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // แก้ไขชื่อไฟล์ให้ตรงกับ "ชื่อไฟล์จริงในเครื่อง" ของครูเจี๊ยบเป๊ะๆ นะคะ
            const [songs, setSongs] = useState([
                { id: 1, title: "1. Sodapop Hunter", file: "soda.mp3", color: "from-pink-600 to-purple-800" },
                { id: 2, title: "2. สเต็ปจิ๋วไฟลุก", file: "step.mp3", color: "from-orange-600 to-red-800" },
                { id: 3, title: "3. Siam Fighter", file: "siam.mp3", color: "from-blue-600 to-cyan-800" },
                { id: 4, title: "4. Doremi Rainbow", file: "doremi.mp3", color: "from-green-600 to-emerald-800" },
                ...Array.from({ length: 11 }, (_, i) => ({
                    id: i + 5, title: `${i + 5}. รอกำหนดเพลง...`, file: "#", color: "from-gray-700 to-gray-900", isEmpty: true
                }))
            ]);

            const [currentTrack, setCurrentTrack] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [bass, setBass] = useState(15);
            const audioRef = useRef(null);
            const audioCtx = useRef(null);
            const bassFilter = useRef(null);

            // ฟังก์ชันตั้งค่าเสียงเบส
            const initAudio = () => {
                if (audioCtx.current) return;
                try {
                    const Context = window.AudioContext || window.webkitAudioContext;
                    audioCtx.current = new Context();
                    const source = audioCtx.current.createMediaElementSource(audioRef.current);
                    bassFilter.current = audioCtx.current.createBiquadFilter();
                    bassFilter.current.type = "lowshelf";
                    bassFilter.current.frequency.value = 150;
                    bassFilter.current.gain.value = bass;
                    source.connect(bassFilter.current);
                    bassFilter.current.connect(audioCtx.current.destination);
                } catch (e) { console.error("Audio Engine Error"); }
            };

            const togglePlay = () => {
                initAudio();
                if (audioCtx.current?.state === 'suspended') audioCtx.current.resume();
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play().catch(e => alert("หาไฟล์เพลงไม่เจอค่ะ! เช็คชื่อไฟล์อีกทีนะคะ"));
                setIsPlaying(!isPlaying);
            };

            const handleUpload = (e) => {
                const files = Array.from(e.target.files);
                const newSongs = [...songs];
                const firstEmpty = newSongs.findIndex(s => s.isEmpty);
                files.forEach((f, i) => {
                    if (firstEmpty + i < 15) {
                        newSongs[firstEmpty + i] = {
                            id: firstEmpty + i + 1,
                            title: `${firstEmpty + i + 1}. ${f.name.replace('.mp3','')}`,
                            file: URL.createObjectURL(f),
                            color: "from-blue-500 to-indigo-900"
                        };
                    }
                });
                setSongs(newSongs);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="glass w-full max-w-xl p-8 bass-glow text-center">
                        <h1 className="text-2xl font-bold mb-1">ISOPIXEL BKK</h1>
                        <p className="text-blue-400 text-[10px] tracking-[0.3em] mb-8">PROFESSIONAL PLAYER</p>

                        <div className={`w-48 h-48 mx-auto rounded-full bg-gradient-to-br ${songs[currentTrack].color} flex items-center justify-center shadow-2xl mb-8 ${isPlaying ? 'animate-[pulse_2s_infinite]' : ''}`}>
                             <div className="bg-black/20 w-40 h-40 rounded-full border-4 border-white/5 flex items-center justify-center">
                                <span className="text-4xl">🎵</span>
                             </div>
                        </div>

                        <h2 className="text-xl font-bold mb-6">{songs[currentTrack].title}</h2>

                        <div className="flex justify-center gap-6 mb-8">
                            <button onClick={togglePlay} className="w-20 h-20 bg-blue-600 rounded-full text-3xl shadow-lg hover:scale-105 active:scale-95 transition-all">
                                {isPlaying ? "⏸" : "▶️"}
                            </button>
                        </div>

                        <div className="p-4 bg-white/5 rounded-2xl mb-8">
                            <label className="text-xs text-blue-300 block mb-2">ปรับพลังเบส: {bass} dB</label>
                            <input type="range" min="0" max="25" value={bass} onChange={e => setBass(e.target.value)} className="w-full h-2 bg-blue-900 rounded-lg appearance-none cursor-pointer" />
                        </div>

                        <label className="block w-full py-4 border-2 border-dashed border-white/20 rounded-xl cursor-pointer hover:bg-white/5 mb-8">
                            <span className="text-sm">➕ คลิกอัปโหลดเพลงเพิ่ม (15 เพลง)</span>
                            <input type="file" multiple accept="audio/*" className="hidden" onChange={handleUpload} />
                        </label>

                        <div className="text-left space-y-2 max-h-60 overflow-y-auto pr-2">
                            {songs.map((s, i) => (
                                <div key={i} onClick={() => { if(!s.isEmpty){ setCurrentTrack(i); setIsPlaying(true); }}} 
                                     className={`p-3 rounded-lg flex justify-between ${currentTrack === i ? 'bg-blue-600' : 'bg-white/5'}`}>
                                    <span className="text-sm">{s.title}</span>
                                    {!s.isEmpty && <span className="text-xs opacity-50">READY</span>}
                                </div>
                            ))}
                        </div>
                    </div>
                    <audio ref={audioRef} src={songs[currentTrack].file} onEnded={() => setCurrentTrack((currentTrack+1)%15)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
