<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISOPIXEL BKK - Master Pro Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #020617; color: white; margin: 0; }
        .master-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; box-shadow: 0 0 60px rgba(37, 99, 235, 0.2); }
        .playlist-scroll { max-height: 400px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2563eb transparent; }
        input[type='range'] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 6px; outline: none; }
        input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #2563eb; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        @keyframes disc-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .is-playing { animation: disc-spin 4s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ชุดไอคอนแบบ Professional ---
        const Icons = {
            Play: () => <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>,
            Pause: () => <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>,
            Download: () => <svg width="22" height="22" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>,
            Delete: () => <svg width="20" height="20" fill="none" stroke="#ff4d4d" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></svg>,
            Upload: () => <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        };

        const App = () => {
            const emptySlot = (id) => ({ id, title: "ว่าง (รอกำหนดเพลง)", file: null, isEmpty: true });
            
            const [songs, setSongs] = useState([
                { id: 1, title: "1. Sodapop Hunter", file: "soda.mp3", color: "from-pink-500" },
                { id: 2, title: "2. สเต็ปจิ๋วไฟลุก", file: "step.mp3", color: "from-orange-500" },
                { id: 3, title: "3. Siam Fighter", file: "siam.mp3", color: "from-blue-500" },
                { id: 4, title: "4. Doremi Rainbow", file: "doremi.mp3", color: "from-green-500" },
                ...Array.from({ length: 11 }, (_, i) => emptySlot(i + 5))
            ]);

            const [currentIdx, setCurrentIdx] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [bass, setBass] = useState(15);
            const [volume, setVolume] = useState(1);
            
            const audioRef = useRef(null);
            const audioCtx = useRef(null);
            const bassNode = useRef(null);

            const setupAudio = () => {
                if (audioCtx.current) return;
                try {
                    const Context = window.AudioContext || window.webkitAudioContext;
                    audioCtx.current = new Context();
                    const source = audioCtx.current.createMediaElementSource(audioRef.current);
                    bassNode.current = audioCtx.current.createBiquadFilter();
                    bassNode.current.type = "lowshelf";
                    bassNode.current.frequency.value = 150;
                    bassNode.current.gain.value = bass;
                    source.connect(bassNode.current);
                    bassNode.current.connect(audioCtx.current.destination);
                } catch (e) { console.warn("Bass Engine Error"); }
            };

            useEffect(() => { if (bassNode.current) bassNode.current.gain.value = bass; }, [bass]);

            const handleUpload = (e) => {
                const files = Array.from(e.target.files);
                const updated = [...songs];
                let fileIdx = 0;
                for (let i = 0; i < updated.length && fileIdx < files.length; i++) {
                    if (updated[i].isEmpty) {
                        updated[i] = { 
                            id: i+1, 
                            title: files[fileIdx].name.replace('.mp3', ''), 
                            file: URL.createObjectURL(files[fileIdx]), 
                            isEmpty: false,
                            color: "from-blue-600"
                        };
                        fileIdx++;
                    }
                }
                setSongs(updated);
            };

            const removeSong = (id, e) => {
                e.stopPropagation();
                setSongs(songs.map(s => s.id === id ? emptySlot(id) : s));
                if (currentIdx === id - 1) setIsPlaying(false);
            };

            const togglePlay = () => {
                if (!songs[currentIdx].file) return;
                setupAudio();
                if (audioCtx.current?.state === 'suspended') audioCtx.current.resume();
                isPlaying ? audioRef.current.pause() : audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="master-panel w-full max-w-xl p-8 md:p-10">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold">ISOPIXEL MASTER</h1>
                            <p className="text-blue-500 text-[10px] uppercase tracking-[0.4em] font-bold">PRO AUDIO SYSTEM</p>
                        </div>

                        {/* Professional Visualizer */}
                        <div className="flex flex-col items-center mb-10">
                            <div className={`w-48 h-48 rounded-full bg-gradient-to-br ${songs[currentIdx].color || 'from-gray-800'} to-black p-1 shadow-2xl transition-all duration-700 ${isPlaying ? 'scale-105 ring-4 ring-blue-500/20' : ''}`}>
                                <div className={`w-full h-full rounded-full border-2 border-white/10 flex items-center justify-center ${isPlaying ? 'is-playing' : ''}`}>
                                    <div className="w-12 h-12 bg-black/40 rounded-full border border-white/20"></div>
                                </div>
                            </div>
                            <h2 className="text-2xl font-bold mt-8 truncate max-w-xs">{songs[currentIdx].title}</h2>
                        </div>

                        {/* Mixer Control (Bass/Volume) */}
                        <div className="grid grid-cols-2 gap-6 mb-8 p-5 bg-white/5 rounded-2xl border border-white/10">
                            <div className="space-y-2">
                                <label className="text-[10px] text-blue-400 font-bold uppercase flex justify-between">
                                    <span>Bass Boost</span> <span>{bass}dB</span>
                                </label>
                                <input type="range" min="0" max="25" value={bass} onChange={e => setBass(parseInt(e.target.value))} className="w-full" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] text-gray-400 font-bold uppercase flex justify-between">
                                    <span>Master Vol</span> <span>{Math.round(volume * 100)}%</span>
                                </label>
                                <input type="range" min="0" max="1" step="0.01" value={volume} onChange={e => {
                                    setVolume(e.target.value);
                                    audioRef.current.volume = e.target.value;
                                }} className="w-full" />
                            </div>
                        </div>

                        {/* Playback Controls */}
                        <div className="flex justify-center items-center gap-10 mb-8">
                            <button onClick={togglePlay} className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-xl hover:bg-blue-500 active:scale-90 transition-all">
                                {isPlaying ? <Icons.Pause /> : <Icons.Play />}
                            </button>
                        </div>

                        {/* Upload Zone */}
                        <label className="flex items-center justify-center gap-3 w-full py-4 mb-8 bg-blue-600/5 border-2 border-dashed border-blue-500/20 rounded-2xl cursor-pointer hover:bg-blue-600/10 transition-all group">
                            <Icons.Upload />
                            <span className="text-sm font-bold text-blue-300">คลิกเพื่อเพิ่มเพลง (รองรับ 15 เพลง)</span>
                            <input type="file" multiple accept="audio/mp3" className="hidden" onChange={handleUpload} />
                        </label>

                        {/* Playlist with Download & Delete buttons */}
                        <div className="playlist-scroll space-y-2 pr-2">
                            {songs.map((song, index) => (
                                <div key={index} 
                                     className={`flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all ${currentIdx === index ? 'bg-blue-600 text-white' : 'bg-white/5 hover:bg-white/10'}`}
                                     onClick={() => !song.isEmpty && setCurrentIdx(index)}>
                                    <div className="flex items-center gap-4 flex-1 truncate">
                                        <span className="text-[10px] font-bold opacity-30">{index + 1}</span>
                                        <span className={`text-sm font-semibold truncate ${song.isEmpty ? 'text-gray-600 italic' : ''}`}>{song.title}</span>
                                    </div>
                                    {!song.isEmpty && (
                                        <div className="flex items-center gap-2">
                                            {/* ปุ่มดาวน์โหลด (ลูกศรลง) */}
                                            <a href={song.file} download={`${song.title}.mp3`} onClick={e => e.stopPropagation()} className="p-2 hover:bg-black/20 rounded-full transition-all" title="ดาวน์โหลด">
                                                <Icons.Download />
                                            </a>
                                            {/* ปุ่มลบ (ถังขยะ) */}
                                            <button onClick={(e) => removeSong(song.id, e)} className="p-2 hover:bg-red-500/20 rounded-full transition-all" title="ลบเพลง">
                                                <Icons.Delete />
                                            </button>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                    <audio ref={audioRef} src={songs[currentIdx].file} onEnded={() => setCurrentIdx((currentIdx + 1) % 15)} />
                    <p className="mt-10 text-[9px] opacity-20 tracking-[0.5em] uppercase">ISOPIXEL Stable v3.1 Master Core</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
