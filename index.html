<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISOPIXEL BKK - Professional Audio Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #020617; color: white; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; }
        .bass-glow { box-shadow: 0 0 50px rgba(59, 130, 246, 0.15); transition: box-shadow 0.3s; }
        .playing-glow { box-shadow: 0 0 60px rgba(59, 130, 246, 0.3); }
        .playlist-scroll { max-height: 380px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #3b82f6 transparent; }
        input[type='range'] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 6px; outline: none; }
        input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Play: () => <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3v18l15-9L5 3z"/></svg>,
            Pause: () => <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>,
            SkipBack: () => <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>,
            SkipFwd: () => <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>,
            Disc: () => <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="0.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>,
            Upload: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Download: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        };

        const App = () => {
            const [songs, setSongs] = useState([
                { id: 1, title: "1. Sodapop Hunter", file: "soda.mp3", color: "from-pink-600 to-purple-800" },
                { id: 2, title: "2. สเต็ปจิ๋วไฟลุก", file: "step.mp3", color: "from-orange-600 to-red-800" },
                { id: 3, title: "3. Siam Fighter", file: "siam.mp3", color: "from-blue-600 to-cyan-800" },
                { id: 4, title: "4. Doremi Rainbow", file: "doremi.mp3", color: "from-green-600 to-emerald-800" },
                // ตัวสำรองช่อง 5-15
                ...Array.from({ length: 11 }, (_, i) => ({
                    id: i + 5, title: `${i + 5}. รอกำหนดเพลง...`, file: "#", color: "from-gray-700 to-gray-900", isEmpty: true
                }))
            ]);

            const [currentTrackIndex, setCurrentTrackIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [volume, setVolume] = useState(1);
            const [bass, setBass] = useState(15);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);

            const audioRef = useRef(null);
            const audioContextRef = useRef(null);
            const bassFilterRef = useRef(null);
            const sourceRef = useRef(null);

            // ฟังก์ชันตั้งค่าเสียง Professional (Bass Booster)
            const initAudioEngine = () => {
                if (audioContextRef.current) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContextRef.current = new AudioContext();
                    sourceRef.current = audioContextRef.current.createMediaElementSource(audioRef.current);
                    bassFilterRef.current = audioContextRef.current.createBiquadFilter();
                    bassFilterRef.current.type = "lowshelf";
                    bassFilterRef.current.frequency.value = 150;
                    bassFilterRef.current.gain.value = bass;
                    sourceRef.current.connect(bassFilterRef.current);
                    bassFilterRef.current.connect(audioContextRef.current.destination);
                } catch (e) { console.warn("Engine Fallback"); }
            };

            useEffect(() => {
                if (bassFilterRef.current) bassFilterRef.current.gain.value = bass;
            }, [bass]);

            useEffect(() => {
                if (audioRef.current) {
                    audioRef.current.load();
                    if (isPlaying) audioRef.current.play().catch(() => setIsPlaying(false));
                }
            }, [currentTrackIndex]);

            const handleUpload = (e) => {
                const files = Array.from(e.target.files);
                const nextEmptyIndex = songs.findIndex(s => s.isEmpty);
                if (nextEmptyIndex === -1) return;

                const newSongs = [...songs];
                files.forEach((file, i) => {
                    const idx = nextEmptyIndex + i;
                    if (idx < 15) {
                        newSongs[idx] = {
                            id: idx + 1,
                            title: `${idx + 1}. ${file.name.replace('.mp3', '')}`,
                            file: URL.createObjectURL(file),
                            color: "from-blue-500 to-indigo-800",
                            isLocal: true
                        };
                    }
                });
                setSongs(newSongs);
            };

            const togglePlay = () => {
                initAudioEngine();
                if (audioContextRef.current?.state === 'suspended') audioContextRef.current.resume();
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className={`glass w-full max-w-xl p-8 bass-glow ${isPlaying ? 'playing-glow' : ''}`}>
                        
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold tracking-tighter">ISOPIXEL BKK</h1>
                            <p className="text-blue-400 text-[10px] uppercase tracking-[0.4em]">Master Quality Performance</p>
                        </div>

                        {/* Professional Disc Visualizer */}
                        <div className="flex flex-col items-center mb-10">
                            <div className={`w-56 h-56 rounded-full bg-gradient-to-br ${songs[currentTrackIndex].color} flex items-center justify-center border-8 border-white/5 transition-all duration-700 shadow-2xl ${isPlaying ? 'scale-105' : 'scale-95'}`}>
                                <div className={`text-white/20 ${isPlaying ? 'animate-[spin_4s_linear_infinite]' : ''}`}>
                                    <Icons.Disc />
                                </div>
                            </div>
                            <h2 className="text-2xl font-bold mt-8 text-white drop-shadow-lg">{songs[currentTrackIndex].title}</h2>
                        </div>

                        {/* Controls */}
                        <div className="flex items-center justify-center gap-10 mb-8">
                            <button onClick={() => setCurrentTrackIndex((currentTrackIndex - 1 + 15) % 15)} className="text-gray-500 hover:text-white"><Icons.SkipBack /></button>
                            <button onClick={togglePlay} className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.4)] hover:bg-blue-500 transition-all active:scale-90">
                                {isPlaying ? <Icons.Pause /> : <Icons.Play />}
                            </button>
                            <button onClick={() => setCurrentTrackIndex((currentTrackIndex + 1) % 15)} className="text-gray-500 hover:text-white"><Icons.SkipFwd /></button>
                        </div>

                        {/* Master Mixers (Bass & Volume) */}
                        <div className="grid grid-cols-2 gap-4 mb-10 p-5 bg-black/30 rounded-2xl border border-white/5">
                            <div className="space-y-2">
                                <label className="text-[10px] text-blue-400 uppercase font-bold flex justify-between">
                                    <span>Bass Booster</span> <span>{bass}dB</span>
                                </label>
                                <input type="range" min="0" max="25" value={bass} onChange={(e) => setBass(parseInt(e.target.value))} className="w-full" />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] text-gray-400 uppercase font-bold flex justify-between">
                                    <span>Master Vol</span> <span>{Math.round(volume * 100)}%</span>
                                </label>
                                <input type="range" min="0" max="1" step="0.01" value={volume} onChange={(e) => {
                                    setVolume(e.target.value);
                                    audioRef.current.volume = e.target.value;
                                }} className="w-full" />
                            </div>
                        </div>

                        {/* Upload Interface */}
                        <label className="flex items-center justify-center gap-3 w-full py-4 mb-8 bg-blue-600/10 border-2 border-dashed border-blue-500/30 rounded-xl cursor-pointer hover:bg-blue-600/20 transition-all group">
                            <Icons.Upload />
                            <span className="text-sm font-semibold text-blue-300">คลิกเพื่ออัปโหลดเพลงเพิ่ม (รองรับ 15 เพลง)</span>
                            <input type="file" multiple accept="audio/mp3" className="hidden" onChange={handleUpload} />
                        </label>

                        {/* Professional Playlist */}
                        <div className="playlist-scroll space-y-2 pr-2">
                            {songs.map((song, index) => (
                                <div 
                                    key={song.id} 
                                    className={`flex items-center justify-between p-4 rounded-xl cursor-pointer transition-all ${currentTrackIndex === index ? 'bg-blue-600 text-white shadow-lg' : 'bg-white/5 hover:bg-white/10'}`}
                                    onClick={() => !song.isEmpty && setCurrentTrackIndex(index)}
                                >
                                    <div className="flex items-center gap-4">
                                        <span className="text-[10px] font-bold opacity-40">{song.id < 10 ? `0${song.id}` : song.id}</span>
                                        <span className={`text-sm font-semibold ${song.isEmpty ? 'text-gray-600 italic' : ''}`}>{song.title}</span>
                                    </div>
                                    {!song.isEmpty && (
                                        <a href={song.file} download className="p-2 hover:bg-black/20 rounded-full"><Icons.Download /></a>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <audio 
                        ref={audioRef} 
                        src={songs[currentTrackIndex].file} 
                        onTimeUpdate={(e) => setCurrentTime(e.target.currentTime)}
                        onLoadedMetadata={(e) => setDuration(e.target.duration)}
                        onEnded={() => setCurrentTrackIndex((currentTrackIndex + 1) % 15)}
                    />
                    <p className="mt-10 text-[9px] text-white/20 uppercase tracking-[0.5em]">ISOPIXEL Professional Core v2.6</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
