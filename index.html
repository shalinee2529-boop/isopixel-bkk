<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISOPIXEL BKK - Studio Master Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #010409; color: white; margin: 0; }
        .master-panel { background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; box-shadow: 0 0 100px rgba(37, 99, 235, 0.3); }
        .playlist-scroll { max-height: 350px; overflow-y: auto; }
        input[type='range'] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 6px; }
        input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #2563eb; border-radius: 50%; cursor: pointer; border: 3px solid #fff; }
        .loading-bar { height: 4px; background: #2563eb; transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [songs, setSongs] = useState([
                { id: 1, title: "1. Sodapop Hunter", file: "soda.mp3", color: "from-pink-500" },
                { id: 2, title: "2. สเต็ปจิ๋วไฟลุก", file: "step.mp3", color: "from-orange-500" },
                { id: 3, title: "3. Siam Fighter", file: "siam.mp3", color: "from-blue-500" },
                { id: 4, title: "4. Doremi Rainbow", file: "doremi.mp3", color: "from-green-500" },
                ...Array.from({ length: 11 }, (_, i) => ({ id: i + 5, title: "ว่าง", file: null, isEmpty: true }))
            ]);

            const [currentIdx, setCurrentIdx] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [bass, setBass] = useState(15);
            const [clarity, setClarity] = useState(10);
            const [isExporting, setIsExporting] = useState(false);
            
            const audioRef = useRef(null);
            const audioCtx = useRef(null);
            const bassNode = useRef(null);
            const clarityNode = useRef(null);

            // --- ฟังก์ชันดาวน์โหลดเวอร์ชั่นที่ "ซ่อมแล้ว" ---
            const downloadMastered = async (song) => {
                if (!song.file || isExporting) return;
                setIsExporting(true);
                
                try {
                    // 1. โหลดข้อมูลเสียงดิบ
                    const response = await fetch(song.file);
                    const arrayBuffer = await response.arrayBuffer();
                    const offlineCtx = new OfflineAudioContext(2, 44100 * 300, 44100); // รองรับได้สูงสุด 5 นาที
                    
                    const decodedBuffer = await offlineCtx.decodeAudioData(arrayBuffer);
                    const source = offlineCtx.createBufferSource();
                    source.buffer = decodedBuffer;

                    // 2. จำลองวงจรซ่อมเสียง (Bass + Clarity + Limiter) ลงในไฟล์
                    const bNode = offlineCtx.createBiquadFilter();
                    bNode.type = "lowshelf"; bNode.frequency.value = 150; bNode.gain.value = bass;

                    const cNode = offlineCtx.createBiquadFilter();
                    cNode.type = "highshelf"; cNode.frequency.value = 3000; cNode.gain.value = clarity;

                    const limiter = offlineCtx.createDynamicsCompressor();
                    limiter.threshold.setValueAtTime(-1.0, 0);
                    limiter.ratio.setValueAtTime(12, 0);

                    source.connect(bNode); bNode.connect(cNode); cNode.connect(limiter); limiter.connect(offlineCtx.destination);
                    
                    source.start(0);
                    const renderedBuffer = await offlineCtx.startRendering();

                    // 3. แปลงเป็นไฟล์ WAV (คุณภาพสูงสุด) เพื่อให้โหลดไปใช้ต่อได้เลย
                    const wavBlob = audioBufferToWav(renderedBuffer);
                    const url = URL.createObjectURL(wavBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `MASTERED_${song.title}.wav`;
                    a.click();
                } catch (e) {
                    alert("เกิดข้อผิดพลาดในการ Master ไฟล์: " + e.message);
                }
                setIsExporting(false);
            };

            // ฟังก์ชันช่วยแปลงข้อมูลเสียงเป็นไฟล์ WAV
            function audioBufferToWav(buffer) {
                let numOfChan = buffer.numberOfChannels,
                    length = buffer.length * numOfChan * 2 + 44,
                    bufferArr = new ArrayBuffer(length),
                    view = new DataView(bufferArr),
                    channels = [], i, sample, offset = 0, pos = 0;

                setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
                setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
                setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan);
                setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);

                for(i=0; i<buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
                while(pos < buffer.length) {
                    for(i=0; i<numOfChan; i++) {
                        sample = Math.max(-1, Math.min(1, channels[i][pos]));
                        sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
                        view.setInt16(44 + offset, sample, true); offset += 2;
                    }
                    pos++;
                }
                return new Blob([bufferArr], {type: "audio/wav"});
                function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
                function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="master-panel w-full max-w-2xl p-10 relative">
                        {isExporting && (
                            <div className="absolute top-0 left-0 w-full h-1 bg-blue-500 animate-pulse rounded-t-full"></div>
                        )}
                        
                        <div className="text-center mb-10">
                            <h1 className="text-3xl font-bold bg-gradient-to-r from-blue-400 to-white bg-clip-text text-transparent italic">MASTERING STUDIO v5.0</h1>
                            <p className="text-blue-500 text-[9px] font-bold uppercase tracking-[0.5em] mt-2">Real-time Repair & Export System</p>
                        </div>

                        {/* Player Controls */}
                        <div className="flex flex-col items-center mb-10">
                            <div className={`w-48 h-48 rounded-full bg-gradient-to-br ${songs[currentIdx].color || 'from-gray-800'} to-black flex items-center justify-center shadow-2xl transition-all ${isPlaying ? 'scale-105' : ''}`}>
                                <span className="text-5xl">{isPlaying ? '🔊' : '🔇'}</span>
                            </div>
                            <h2 className="text-2xl font-bold mt-8 text-center">{songs[currentIdx].title}</h2>
                        </div>

                        {/* Mastering Console */}
                        <div className="grid grid-cols-2 gap-6 mb-10 p-6 bg-black/40 rounded-3xl border border-white/5">
                            <div className="space-y-3">
                                <label className="text-[10px] text-blue-400 font-bold uppercase tracking-widest flex justify-between">
                                    <span>BASS BOOST</span> <span>{bass}dB</span>
                                </label>
                                <input type="range" min="0" max="25" value={bass} onChange={e => setBass(parseInt(e.target.value))} className="w-full" />
                            </div>
                            <div className="space-y-3">
                                <label className="text-[10px] text-cyan-400 font-bold uppercase tracking-widest flex justify-between">
                                    <span>CLARITY</span> <span>{clarity}dB</span>
                                </label>
                                <input type="range" min="0" max="20" value={clarity} onChange={e => setClarity(parseInt(e.target.value))} className="w-full" />
                            </div>
                        </div>

                        {/* Play Button */}
                        <div className="flex justify-center mb-10">
                            <button onClick={() => { setIsPlaying(!isPlaying); isPlaying ? audioRef.current.pause() : audioRef.current.play() }} className="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center text-3xl shadow-xl hover:bg-blue-500 transition-all">
                                {isPlaying ? '⏸' : '▶️'}
                            </button>
                        </div>

                        {/* Playlist with Master Download */}
                        <div className="playlist-scroll space-y-3 pr-2">
                            {songs.map((song, index) => (
                                <div key={index} className={`flex items-center justify-between p-4 rounded-2xl ${currentIdx === index ? 'bg-blue-600' : 'bg-white/5'}`} onClick={() => !song.isEmpty && setCurrentIdx(index)}>
                                    <span className="text-sm font-semibold truncate flex-1">{song.title}</span>
                                    {!song.isEmpty && (
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); downloadMastered(song); }} 
                                            className="ml-4 p-2 bg-white/10 hover:bg-white/20 rounded-full text-[10px] font-bold"
                                            disabled={isExporting}
                                        >
                                            {isExporting && currentIdx === index ? 'Mastering...' : '⬇️ MASTER DOWNLOAD'}
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                    <audio ref={audioRef} src={songs[currentIdx].file} crossOrigin="anonymous" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
